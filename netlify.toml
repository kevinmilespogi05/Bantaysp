# Netlify Configuration for Bantaysp Frontend

[build]
  command = "NPM_CONFIG_PRODUCTION=false npm install && npm run build:frontend"
  publish = "dist"

[build.environment]
  # Vite should build for production
  NODE_ENV = "production"

# Redirects for Single Page Application - Handle client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Custom headers for security and performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Caching for static assets
[[headers]]
  for = "/dist/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Production environment variables
[context.production.environment]
  VITE_SUPABASE_URL = "https://cepefukwfszkgosnjmbc.supabase.co"
  # NOTE: Add these via Netlify Dashboard (Build & Deploy > Environment):
  # - VITE_SUPABASE_ANON_KEY
  # - VITE_API_URL (set to your Render backend URL)

# Preview deployments
[context.deploy-preview.environment]
  VITE_SUPABASE_URL = "https://cepefukwfszkgosnjmbc.supabase.co"

# Branch deployments
[context.branch-deploy.environment]
  VITE_SUPABASE_URL = "https://cepefukwfszkgosnjmbc.supabase.co"

